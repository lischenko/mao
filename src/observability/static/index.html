<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>mao observability</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <h1 id="project-name">mao</h1>
        <span id="project-meta"></span>
        <span id="status-counts" class="status-counts"></span>
        <span class="connection" id="connection-state">connecting</span>
      </header>

      <div class="workspace" id="workspace">
        <aside class="sidebar">
          <div class="graph-wrap">
            <svg id="graph-svg" class="graph-svg"></svg>
            <p class="empty hidden" id="empty-state">No agents</p>
          </div>
        </aside>

        <section class="main-panel">
          <div id="panels-container" class="panels-container"></div>
        </section>

        <svg id="connector-overlay" class="connector-overlay" aria-hidden="true"></svg>
      </div>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
